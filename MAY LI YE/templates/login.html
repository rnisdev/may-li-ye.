<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | MAY LI YE</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0a1f44,#0d4c92);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#0a1f44;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#0a1f44;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d4c92;
}

.signup{
margin-top:15px;
font-size:14px;
}

.signup a{
color:#ff6600;
text-decoration:none;
font-weight:bold;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#0a1f44;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">MAY LI YE</div>

<h2>Client Login</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="signup">

Don't have an account?

<a href="/signup">Create one</a>

</div>

</div>

</body>
</html>
